<svg width="32" height="32" viewBox="0 0 32 32" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Inventory Management System — Favicon</title>
  <desc>Square favicon icon for the Inventory Management System.</desc>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- Shelf lines -->
  <line x1="5" y1="26" x2="27" y2="26" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="19" x2="27" y2="19" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="12" x2="27" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vertical supports -->
  <line x1="5.5" y1="12" x2="5.5" y2="26" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26.5" y1="12" x2="26.5" y2="26" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Box on top shelf -->
  <rect x="8" y="6" width="7" height="6" rx="1.5" fill="#ffffff"/>

  <!-- Purple arrow -->
  <line x1="20" y1="11" x2="20" y2="5" stroke="#863bff" stroke-width="2" stroke-linecap="round"/>
  <polyline points="17,8 20,4.5 23,8" fill="none" stroke="#863bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
