<svg width="480" height="120" viewBox="0 0 480 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Inventory Management System — Horizontal Lockup</title>
  <desc>Full sidebar logo with icon and wordmark for the Inventory Management System.</desc>

  <rect width="480" height="120" fill="#ffffff"/>

  <!-- App icon square -->
  <rect x="20" y="12" width="96" height="96" rx="18" fill="#0f1117"/>

  <!-- Shelf lines -->
  <line x1="36" y1="88" x2="100" y2="88" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="68" x2="100" y2="68" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="100" y2="48" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical supports -->
  <line x1="37" y1="48" x2="37" y2="88" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="99" y1="48" x2="99" y2="88" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Box on top shelf -->
  <rect x="47" y="35" width="14" height="13" rx="2" fill="#ffffff"/>

  <!-- Purple arrow -->
  <line x1="71" y1="46" x2="71" y2="35" stroke="#863bff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="66,40 71,34 76,40" fill="none" stroke="#863bff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="136" y="52" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="-0.3" fill="#0f1117">Inventory</text>
  <text x="136" y="76" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="3.5" fill="#0f1117">MANAGEMENT</text>
  <line x1="136" y1="84" x2="440" y2="84" stroke="#e0e0e0" stroke-width="0.75"/>
</svg>
