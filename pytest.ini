[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py

# FIX: --reuse-db was causing schema drift — running tests after adding a
# migration without also passing --create-db meant tests ran against a stale
# schema and produced confusing failures unrelated to actual code bugs.
#
# Removed --reuse-db. In-memory SQLite (now set in test.py) recreates the
# schema from scratch on every run, so it's always fresh and nearly as fast.
#
# --migrations ensures Django applies all migrations rather than using
# inspectdb, which catches migration-model mismatches during the test run.
addopts = -v --migrations