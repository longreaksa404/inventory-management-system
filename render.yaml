databases:
  - name: inventory-db
    plan: free # Creates the required database

services:
  - type: web
    name: inventory-management-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Required configuration: Render will prompt you for your Upstash URL
      - key: CELERY_BROKER_URL
        sync: false # Also required for your Celery setup
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"